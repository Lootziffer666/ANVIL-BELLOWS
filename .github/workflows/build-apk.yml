name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:    # Manual trigger from GitHub Actions tab

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x Android/AnvilBellows/gradlew

      - name: Build debug APK
        working-directory: Android/AnvilBellows
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: anvil-bellows-debug
          path: Android/AnvilBellows/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
